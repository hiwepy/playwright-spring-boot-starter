server:
  port: 8070

################################################################################################################
###Playwright（PlaywrightProperties）配置：
################################################################################################################
playwright:
  browser-pool:
    max-idle: 4
    min-idle: 2
    max-total: 4
    test-on-borrow: true
    test-while-idle: true
    test-on-return: true
  launch-options:
    headless: false
    args:
      - '--start-maximized'
      - '--ignore-certificate-errors'
    slow-mo: 3
  launch-persistent-options:
    headless: false
    args:
      - '--start-maximized'
      - '--ignore-certificate-errors'
    slow-mo: 3
  new-context-options:
    ignore-https-errors: true
    screen-size:
      width: 1920
      height: 1080
  render:
    load-wait: 5s
    reloadable: true
    reload-wait: 3s
    reload-limit: 3
    retryable: true
    lower-limit: 100
    tmp-dir: /tmp
