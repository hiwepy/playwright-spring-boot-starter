server:
  port: 8070

################################################################################################################
###Playwright（PlaywrightProperties）配置：
################################################################################################################
playwright:
  isolated: false
  browser-type: chromium
  browser-page-pool:
    max-idle: 16
    min-idle: 0
    max-total: 16
    test-on-borrow: true
    test-while-idle: true
    test-on-return: true
  browser-context-pool:
    max-idle: 16
    min-idle: 0
    max-total: 16
    test-on-borrow: true
    test-while-idle: true
    test-on-return: true
  launch-options:
    headless: false
    args:
      - '--start-maximized'
      - '--ignore-certificate-errors'
    slow-mo: 3
  new-context-options:
    ignore-https-errors: true
    screen-size:
      width: 1920
      height: 1780
  render:
    load-wait: false
    load-wait-duration: 3s
    reload-able: true
    reload-wait: false
    reload-wait-duration: 2s
    reload-limit: 3
    lower-limit: 100
    tmp-dir: D://tmp
