server:
  port: 8070

################################################################################################################
###Playwright（PlaywrightProperties）配置：
################################################################################################################
playwright:
  browser-type: chromium
  browser-page-pool:
    max-idle: 8
    min-idle: 0
    max-total: 8
    test-on-borrow: true
    test-while-idle: true
    test-on-return: true
  browser-context-pool:
    max-idle: 8
    min-idle: 0
    max-total: 8
    test-on-borrow: true
    test-while-idle: true
    test-on-return: true
  launch-options:
    headless: false
    args:
      - '--start-maximized'
      - '--ignore-certificate-errors'
    slow-mo: 3
  launch-persistent-options:
    user-data-dir: D://tmp
    headless: false
    args:
      - '--start-maximized'
      - '--ignore-certificate-errors'
    slow-mo: 3
  new-context-options:
    ignore-https-errors: true
    screen-size:
      width: 1920
      height: 1780
  render:
    load-wait: 1s
    reloadable: true
    reload-wait: 1s
    reload-limit: 3
    retryable: true
    lower-limit: 100
    tmp-dir: D://tmp
